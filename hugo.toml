baseURL = 'https://jacobxli.ca/'
languageCode = 'en-us'
title = "Jacob Li"
theme = 'PaperMod'

[params]
  env = "production"
  description = "Jacob Li's personal site & tech blog"
  author = "Jacob Li"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  defaultTheme = "auto"  # auto switches between light/dark based on system

  [params.homeInfoParams]
    Title = "Hey, I'm Jacob 👋"
    Content = "Software developer. Writing about tech, code, and things I find interesting."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jacobxli-xx"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 3
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON needed for search
