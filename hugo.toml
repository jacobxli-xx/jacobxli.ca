baseURL = 'https://jacobxli.ca/'
languageCode = 'en'
title = "Jacob Li"
theme = 'blowfish'

defaultContentLanguage = "en"
enableRobotsTXT = true

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["posts"]

  [params.header]
    layout = "fixed-fill-blur"  # blur effect on scroll

  [params.footer]
    showMenu = true
    showCopyright = true
    showThemeAttribution = false
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.homepage]
    layout = "hero"
    homepageImage = "/img/hero.jpg"
    showRecent = true
    showRecentItems = 6
    showMoreLink = true
    showMoreLinkDest = "posts"
    cardView = true
    cardViewScreenWidth = false
    layoutBackgroundBlur = true
    disableHeroImageFilter = true

  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showWordCount = false
    showBreadcrumbs = true
    showPagination = true
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true
    showRelatedContent = true
    relatedContentLimit = 3
    showZenMode = true

  [params.list]
    showHero = true
    heroStyle = "background"
    showBreadcrumbs = true
    showSummary = true
    cardView = true
    groupByYear = true

  [params.author]
    name = "Jacob Li"
    headline = "Software Developer"
    bio = "Writing about tech, code, and things I find interesting."
    image = ""
    links = [
      { github = "https://github.com/jacobxli-xx" },
      { linkedin = "https://www.linkedin.com/in/xiangli1874/" },
    ]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    pageRef = "posts"
    weight = 1
  [[menu.main]]
    identifier = "about"
    name = "About"
    pageRef = "about"
    weight = 2

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
